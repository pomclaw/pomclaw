Name: "pomclaw"
Host: 0.0.0.0
Port: 18790
Verbose: true
RocketMQ:
  Enable: true
  NameSrv: "http://your-rocketmq-server:8080"
  AccessKey: "YOUR_ROCKETMQ_ACCESS_KEY"
  SecretKey: "YOUR_ROCKETMQ_SECRET_KEY"
  Topic: "mattermost_message"
  GroupName: "mattermost-agent"
  InstanceName: "mattermost"


agents:
  base_workspace: "/path/to/.pomclaw/workspace"
  defaults:
    restrict_to_workspace: true
    provider: "openai"
    model: "glm-5"
    max_tokens: 8192
    temperature: 0.7
    max_tool_iterations: 20
    summarize_message_threshold: 20
    summarize_token_percent: 75


providers:
  openai:
    api_key: "YOUR_OPENAI_API_KEY"
    api_base: "http://your-ai-service:8080/openai-compatible/v1"


heartbeat:
  enabled: false
  interval: 30

devices:
  enabled: false
  monitor_usb: true

mysql:
  enabled: true
  host: "localhost"
  port: 3306
  database: "pomclaw_db"
  user: "root"
  password: "YOUR_MYSQL_PASSWORD"
  pool_max_open: 10
  pool_max_idle: 2

postgres:
  enabled: true
  host: "localhost"
  port: 5432
  database: "pomclaw"
  user: "postgres"
  password: "YOUR_POSTGRES_PASSWORD"
  ssl_mode: "disable"
  pool_max_open: 25
  pool_max_idle: 5
  agent_id: "default"
  embedding_provider: "api"
  embedding_api_base: "http://your-ai-service:8080/openai-compatible"
  embedding_api_key: "YOUR_EMBEDDING_API_KEY"
  embedding_model: "text-embedding-ada-002"

storage_type: "postgres"

Auth:
  AccessSecret: "YOUR_JWT_ACCESS_SECRET"
  AccessExpire: 86400
  RefreshExpire: 86400
