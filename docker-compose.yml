services:
  # ─────────────────────────────────────────────
  # Pomclaw Gateway (Long-running Bot)
  #   docker compose up pomclaw-gateway
  # ─────────────────────────────────────────────
  pomclaw-gateway:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: pomclaw-gateway
    restart: unless-stopped
    profiles:
      - gateway
    volumes:
      - ./config/config.json:/root/.pomclaw/config.json:ro
      - pomclaw-workspace:/root/.pomclaw/workspace
    environment:
      - POM_STORAGE_TYPE=${POM_STORAGE_TYPE:-postgres}
      - POM_POSTGRES_ENABLED=${POM_POSTGRES_ENABLED:-true}
      - POM_POSTGRES_HOST=${POM_POSTGRES_HOST:-postgres-db}
      - POM_POSTGRES_PORT=${POM_POSTGRES_PORT:-5432}
      - POM_POSTGRES_DATABASE=${POM_POSTGRES_DATABASE:-pomclaw}
      - POM_POSTGRES_USER=${POM_POSTGRES_USER:-postgres}
      - POM_POSTGRES_PASSWORD=${POM_POSTGRES_PASSWORD:-pomclaw123}
      - POM_POSTGRES_SSL_MODE=${POM_POSTGRES_SSL_MODE:-disable}
    command: ["gateway"]
    depends_on:
      postgres-db:
        condition: service_healthy

  # ─────────────────────────────────────────────
  # PostgreSQL Database (default backend)
  #   docker compose up postgres-db
  # ─────────────────────────────────────────────
  postgres-db:
    image: pgvector/pgvector:pg16
    container_name: pomclaw-postgres
    environment:
      - POSTGRES_DB=${POM_POSTGRES_DATABASE:-pomclaw}
      - POSTGRES_USER=${POM_POSTGRES_USER:-postgres}
      - POSTGRES_PASSWORD=${POM_POSTGRES_PASSWORD:-pomclaw123}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

volumes:
  pomclaw-workspace:
  postgres-data:
